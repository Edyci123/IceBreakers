name: icebreakers

services:
  postgres:
    image: postgres:16-alpine
    container_name: icebreakers_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: icebreakers
      POSTGRES_PASSWORD: icebreakers_secret
      POSTGRES_DB: icebreakers
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U icebreakers -d icebreakers"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
